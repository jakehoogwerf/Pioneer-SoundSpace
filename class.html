<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PVS SoundSpace · Class Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="has-player-bar">

<header class="site-header">
  <div class="header-left">
    <div class="logo-wrap">
      <img src="https://pvs.wa.edu.au/wp-content/uploads/2019/09/Pioneer-Village-School-Long.png" alt="Pioneer Village School">
    </div>
    <div class="hd"></div>
    <div class="header-title">
      <h1>PVS SOUNDSPACE</h1>
      <p>Class Music Player</p>
    </div>
  </div>
  <div class="header-right">
    <a class="btn btn-ghost" href="index.html">All Classes</a>
  </div>
</header>
<div class="accent-bar"></div>

<main class="main">
  <a href="index.html" class="back-link">← Back to classes</a>
  <h2 class="page-title" id="classTitle">Class</h2>
  <p class="page-subtitle">Add YouTube links to build a playlist for this class.</p>

  <div class="panel">
    <h3>Add a Song</h3>
    <div class="controls">
      <input id="linkInput" placeholder="Paste a YouTube link…" inputmode="url">
      <button class="btn btn-gold btn-lg" id="addBtn" onclick="addSong()">Add Song</button>
    </div>
    <div class="cooldown-hint" id="cooldownHint" aria-live="polite"></div>
    <div class="kbd-hint" aria-hidden="true">
      <span><kbd>Space</kbd> play/pause</span>
      <span><kbd>←</kbd> previous</span>
      <span><kbd>→</kbd> next</span>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <h3>Playlist</h3>
      <button class="btn btn-outline btn-sm" id="shuffleBtn" onclick="toggleShuffle()">Shuffle: Off</button>
    </div>
    <div id="playlist"></div>
  </div>
</main>

<div id="hiddenPlayerWrap" aria-hidden="true">
  <div id="player"></div>
</div>

<div id="playerBar" class="player-bar" role="region" aria-label="Now playing">
  <div class="player-bar-info">
    <div class="player-bar-thumb" id="playerBarThumb" aria-hidden="true"></div>
    <div class="player-bar-text">
      <div class="player-bar-label">Now Playing</div>
      <div class="player-bar-title-wrap">
        <span class="eq eq-bar" id="playerBarEq" aria-hidden="true"><i></i><i></i><i></i></span>
        <div class="player-bar-title" id="nowPlaying">Nothing playing</div>
      </div>
    </div>
  </div>
  <div class="player-bar-controls">
    <span class="player-bar-time" id="timeDisplay" aria-live="off">0:00 / 0:00</span>
    <button class="player-bar-btn" id="prevBtn" onclick="prev()" aria-label="Previous">⏮</button>
    <button class="player-bar-btn player-bar-btn-primary" id="playBtn" onclick="togglePlay()" aria-label="Play/Pause">▶</button>
    <button class="player-bar-btn" id="nextBtn" onclick="next()" aria-label="Next">⏭</button>
  </div>
  <div class="player-bar-progress" aria-hidden="true">
    <div class="player-bar-progress-fill" id="progressFill"></div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const params = new URLSearchParams(window.location.search);
const classParam = params.get("class") || "default";
const className = classParam;
const apiUrl = "/api/playlist/" + encodeURIComponent(classParam);

document.getElementById("classTitle").innerText =
  className === "PE" ? "PE Class" : className.charAt(0).toUpperCase() + className.slice(1);

let playlist = [];
let shuffle = false;
let currentIndex = -1;
let ytPlayer = null;
let ytReady = false;
let pendingPlay = null;
let isPlaying = false;
let progressTimer = null;

const ADD_COOLDOWN_MS = 8000;
const POLL_INTERVAL_MS = 6000;
let lastAddTime = 0;
let cooldownTimer = null;
let saveInFlight = 0;
let saveQueued = false;
let pollTimer = null;

async function fetchRemotePlaylist() {
  const res = await fetch(apiUrl, { cache: "no-store" });
  if (!res.ok) throw new Error("Failed to load playlist");
  const data = await res.json();
  return Array.isArray(data) ? data : [];
}

async function save() {
  saveQueued = true;
  if (saveInFlight) return;
  while (saveQueued) {
    saveQueued = false;
    saveInFlight++;
    try {
      const res = await fetch(apiUrl, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(playlist)
      });
      if (res.ok) {
        const saved = await res.json();
        if (Array.isArray(saved) && !saveQueued) {
          applyRemotePlaylist(saved);
        }
      }
    } catch (e) {
      // Network blip — next save or poll will reconcile.
    } finally {
      saveInFlight--;
    }
  }
}

function applyRemotePlaylist(next) {
  const before = currentIndex >= 0 ? playlist[currentIndex] : null;
  playlist = next;
  if (before) {
    const newIdx = playlist.findIndex(s => s.id === before.id);
    currentIndex = newIdx;
    if (newIdx === -1) {
      currentIndex = -1;
      isPlaying = false;
      if (ytPlayer && ytPlayer.stopVideo) {
        try { ytPlayer.stopVideo(); } catch (e) {}
      }
      stopProgressTimer();
      setProgress(0);
    }
  }
  render();
  updateNowPlaying();
  updatePlayButton();
}

async function pollRemote() {
  if (saveInFlight || saveQueued) return;
  if (document.hidden) return;
  try {
    const next = await fetchRemotePlaylist();
    if (!playlistsEqual(playlist, next)) {
      applyRemotePlaylist(next);
    }
  } catch (e) {}
}

function playlistsEqual(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) {
    if (a[i].id !== b[i].id || a[i].title !== b[i].title) return false;
  }
  return true;
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollRemote, POLL_INTERVAL_MS);
}

function extractID(url) {
  const trimmed = String(url).trim();
  const regExp = /(?:youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{6,})/;
  const match = trimmed.match(regExp);
  return match ? match[1] : null;
}

function thumbUrl(id) {
  return "https://img.youtube.com/vi/" + id + "/mqdefault.jpg";
}

async function fetchTitle(id) {
  try {
    const res = await fetch(
      "https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=" +
        encodeURIComponent(id) +
        "&format=json"
    );
    if (!res.ok) return null;
    const data = await res.json();
    return data.title || null;
  } catch (e) {
    return null;
  }
}

async function addSong() {
  const now = Date.now();
  const remaining = ADD_COOLDOWN_MS - (now - lastAddTime);
  if (remaining > 0) {
    showCooldown(remaining);
    return;
  }

  const inputEl = document.getElementById("linkInput");
  const id = extractID(inputEl.value);

  if (!id) { alert("Invalid YouTube link"); return; }

  lastAddTime = now;
  const song = { id: id, title: "Loading…" };
  playlist.push(song);
  save();
  render();
  inputEl.value = "";
  startCooldown();

  const title = await fetchTitle(id);
  song.title = title || "YouTube Video";
  save();
  render();
}

function startCooldown() {
  const btn = document.getElementById("addBtn");
  const hint = document.getElementById("cooldownHint");
  if (cooldownTimer) clearInterval(cooldownTimer);

  const tick = () => {
    const remaining = ADD_COOLDOWN_MS - (Date.now() - lastAddTime);
    if (remaining <= 0) {
      if (btn) { btn.disabled = false; btn.innerText = "Add Song"; }
      if (hint) hint.innerText = "";
      clearInterval(cooldownTimer);
      cooldownTimer = null;
      return;
    }
    const secs = Math.ceil(remaining / 1000);
    if (btn) { btn.disabled = true; btn.innerText = "Wait " + secs + "s"; }
    if (hint) hint.innerText = "Cooldown: another song can be added in " + secs + "s.";
  };
  tick();
  cooldownTimer = setInterval(tick, 250);
}

function showCooldown(remaining) {
  const hint = document.getElementById("cooldownHint");
  const secs = Math.ceil(remaining / 1000);
  if (hint) hint.innerText = "Please wait " + secs + "s before adding another song.";
}

async function backfillTitles() {
  let changed = false;
  for (const song of playlist) {
    if (!song.title || song.title === "YouTube Video" || song.title === "Loading…" || song.title === "Loading...") {
      const title = await fetchTitle(song.id);
      if (title) {
        song.title = title;
        changed = true;
      }
    }
  }
  if (changed) {
    save();
    render();
    updateNowPlaying();
  }
}

function deleteSong(index) {
  const wasPlaying = index === currentIndex;
  playlist.splice(index, 1);
  if (wasPlaying) {
    currentIndex = -1;
    isPlaying = false;
    if (ytPlayer && ytPlayer.stopVideo) {
      try { ytPlayer.stopVideo(); } catch (e) {}
    }
    stopProgressTimer();
    setProgress(0);
  } else if (index < currentIndex) {
    currentIndex--;
  }
  save();
  render();
  updateNowPlaying();
  updatePlayButton();
}

function onYouTubeIframeAPIReady() {
  ytReady = true;
  if (pendingPlay !== null) {
    const i = pendingPlay;
    pendingPlay = null;
    play(i);
  }
}

function play(index) {
  if (!playlist.length || index < 0 || index >= playlist.length) return;
  currentIndex = index;

  if (!ytReady) {
    pendingPlay = index;
    return;
  }

  if (!ytPlayer) {
    ytPlayer = new YT.Player("player", {
      width: "0",
      height: "0",
      videoId: playlist[index].id,
      playerVars: {
        autoplay: 1,
        playsinline: 1,
        rel: 0,
        modestbranding: 1
      },
      events: {
        onReady: function(e) { e.target.playVideo(); },
        onStateChange: onPlayerStateChange
      }
    });
  } else {
    ytPlayer.loadVideoById(playlist[index].id);
  }

  isPlaying = true;
  render();
  updateNowPlaying();
  updatePlayButton();
  setProgress(0);
  setTimeDisplay(0, 0);
  startProgressTimer();
}

function onPlayerStateChange(e) {
  if (e.data === YT.PlayerState.ENDED) {
    next();
    return;
  }
  if (e.data === YT.PlayerState.PLAYING) {
    isPlaying = true;
    startProgressTimer();
  } else if (e.data === YT.PlayerState.PAUSED) {
    isPlaying = false;
    stopProgressTimer();
  }
  updatePlayButton();
}

function togglePlay() {
  if (currentIndex < 0) {
    if (playlist.length) play(0);
    return;
  }
  if (!ytPlayer) return;
  try {
    if (isPlaying) ytPlayer.pauseVideo();
    else ytPlayer.playVideo();
  } catch (e) {}
}

function toggleShuffle() {
  shuffle = !shuffle;
  const btn = document.getElementById("shuffleBtn");
  if (btn) {
    btn.innerText = "Shuffle: " + (shuffle ? "On" : "Off");
    btn.classList.toggle("btn-gold", shuffle);
    btn.classList.toggle("btn-outline", !shuffle);
  }
}

function next() {
  if (!playlist.length) return;
  if (shuffle && playlist.length > 1) {
    let n = currentIndex;
    while (n === currentIndex) n = Math.floor(Math.random() * playlist.length);
    currentIndex = n;
  } else {
    currentIndex = (currentIndex + 1) % playlist.length;
  }
  play(currentIndex);
}

function prev() {
  if (!playlist.length) return;
  if (currentIndex <= 0) currentIndex = playlist.length - 1;
  else currentIndex--;
  play(currentIndex);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function updateNowPlaying() {
  const el = document.getElementById("nowPlaying");
  const thumb = document.getElementById("playerBarThumb");
  const eq = document.getElementById("playerBarEq");
  if (currentIndex >= 0 && playlist[currentIndex]) {
    if (el) el.innerText = playlist[currentIndex].title || "YouTube Video";
    if (thumb) {
      thumb.style.backgroundImage = "url('" + thumbUrl(playlist[currentIndex].id) + "')";
      thumb.classList.add("has-art");
    }
    if (eq) eq.classList.add("is-active");
  } else {
    if (el) el.innerText = "Nothing playing";
    if (thumb) {
      thumb.style.backgroundImage = "";
      thumb.classList.remove("has-art");
    }
    if (eq) eq.classList.remove("is-active");
    setTimeDisplay(0, 0);
  }
}

function updatePlayButton() {
  const btn = document.getElementById("playBtn");
  const eq = document.getElementById("playerBarEq");
  if (eq) eq.classList.toggle("is-playing", isPlaying && currentIndex >= 0);
  if (!btn) return;
  btn.innerText = isPlaying ? "⏸" : "▶";
  btn.setAttribute("aria-label", isPlaying ? "Pause" : "Play");
}

function setProgress(ratio) {
  const fill = document.getElementById("progressFill");
  if (!fill) return;
  const pct = Math.max(0, Math.min(1, ratio)) * 100;
  fill.style.width = pct + "%";
}

function formatTime(seconds) {
  if (!isFinite(seconds) || seconds < 0) seconds = 0;
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return m + ":" + (s < 10 ? "0" : "") + s;
}

function setTimeDisplay(current, duration) {
  const el = document.getElementById("timeDisplay");
  if (!el) return;
  el.innerText = formatTime(current) + " / " + formatTime(duration);
}

function startProgressTimer() {
  stopProgressTimer();
  progressTimer = setInterval(() => {
    if (!ytPlayer || !ytPlayer.getDuration) return;
    try {
      const d = ytPlayer.getDuration();
      const t = ytPlayer.getCurrentTime();
      if (d > 0) setProgress(t / d);
      setTimeDisplay(t, d);
    } catch (e) {}
  }, 500);
}

function stopProgressTimer() {
  if (progressTimer) {
    clearInterval(progressTimer);
    progressTimer = null;
  }
}

function render() {
  const div = document.getElementById("playlist");
  div.innerHTML = "";

  if (!playlist.length) {
    div.innerHTML = '<div class="empty-state">No songs yet. Paste a YouTube link above to add one.</div>';
    return;
  }

  playlist.forEach((song, i) => {
    const item = document.createElement("div");
    item.className = "song-row" + (i === currentIndex ? " is-playing" : "");
    item.setAttribute("role", "button");
    item.setAttribute("tabindex", "0");
    item.innerHTML =
      '<div class="song-row-thumb">' +
        '<img src="' + thumbUrl(song.id) + '" alt="" loading="lazy">' +
        '<span class="song-row-indicator" aria-hidden="true">' +
          (i === currentIndex ? '<span class="eq"><i></i><i></i><i></i></span>' : '▶') +
        '</span>' +
      '</div>' +
      '<div class="song-row-info">' +
        '<div class="song-row-title">' + escapeHtml(song.title) + '</div>' +
        (i === currentIndex ? '<div class="song-row-status">Now playing</div>' : '') +
      '</div>' +
      '<button class="song-row-remove" aria-label="Remove" data-index="' + i + '">✕</button>';

    item.addEventListener("click", (e) => {
      if (e.target.closest(".song-row-remove")) return;
      play(i);
    });
    item.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        play(i);
      }
    });
    const removeBtn = item.querySelector(".song-row-remove");
    if (removeBtn) {
      removeBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const entered = window.prompt("Enter password to remove this song:");
        if (entered === null) return;
        if (entered !== "2222") {
          window.alert("Incorrect password.");
          return;
        }
        deleteSong(i);
      });
    }
    div.appendChild(item);
  });
}

async function init() {
  try {
    playlist = await fetchRemotePlaylist();
  } catch (e) {
    playlist = [];
  }
  render();
  updateNowPlaying();
  updatePlayButton();
  backfillTitles();
  startPolling();
}

init();

document.addEventListener("keydown", (e) => {
  const target = e.target;
  const tag = target && target.tagName;
  const typing = tag === "INPUT" || tag === "TEXTAREA" || (target && target.isContentEditable);
  if (typing) return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;

  if (e.code === "Space" || e.key === " ") {
    e.preventDefault();
    togglePlay();
  } else if (e.key === "ArrowRight") {
    e.preventDefault();
    next();
  } else if (e.key === "ArrowLeft") {
    e.preventDefault();
    prev();
  }
});

document.getElementById("linkInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    e.preventDefault();
    addSong();
  }
});
</script>

</body>
</html>
