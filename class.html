<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PVS SoundSpace · Class Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <div class="logo-wrap">
      <img src="https://pvs.wa.edu.au/wp-content/uploads/2019/09/Pioneer-Village-School-Long.png" alt="Pioneer Village School">
    </div>
    <div class="hd"></div>
    <div class="header-title">
      <h1>PVS SOUNDSPACE</h1>
      <p>Class Music Player</p>
    </div>
  </div>
  <div class="header-right">
    <a class="btn btn-ghost" href="index.html">All Classes</a>
  </div>
</header>
<div class="accent-bar"></div>

<main class="main">
  <a href="index.html" class="back-link">← Back to classes</a>
  <h2 class="page-title" id="classTitle">Class</h2>
  <p class="page-subtitle">Add YouTube links to build a playlist for this class.</p>

  <section class="now-playing" id="nowPlaying" aria-live="polite">
    <div class="now-playing-label">Now Playing</div>
    <div class="now-playing-title" id="nowPlayingTitle">Nothing playing yet</div>
  </section>

  <div class="player-wrap" id="playerWrap">
    <div class="player-placeholder" id="playerPlaceholder">No song playing yet — add a link or press play below.</div>
    <div id="player" style="display:none;"></div>
  </div>

  <div class="player-controls" id="playerControls" style="display:none;">
    <button class="btn btn-navy btn-lg" id="prevBtn" onclick="prev()">⏮ Previous</button>
    <button class="btn btn-navy btn-lg" id="nextBtn" onclick="next()">Next ⏭</button>
    <button class="btn btn-outline btn-lg" id="shuffleBtn" onclick="toggleShuffle()">Shuffle: Off</button>
  </div>

  <div class="panel">
    <h3>Add a Song</h3>
    <div class="controls">
      <input id="linkInput" placeholder="Paste a YouTube link…" inputmode="url">
      <button class="btn btn-gold btn-lg" onclick="addSong()">Add Song</button>
    </div>
  </div>

  <div class="panel">
    <h3>Playlist</h3>
    <div id="playlist"></div>
  </div>
</main>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
const params = new URLSearchParams(window.location.search);
const classParam = params.get("class") || "default";
const className = classParam;
const storageKey = "playlist_" + className;
const legacyKey = className;

document.getElementById("classTitle").innerText =
  className === "PE" ? "PE Class" : className.charAt(0).toUpperCase() + className.slice(1);

function loadPlaylist() {
  const raw = localStorage.getItem(storageKey);
  if (raw) {
    try { return JSON.parse(raw) || []; } catch (e) { return []; }
  }
  const legacy = localStorage.getItem(legacyKey);
  if (legacy && legacyKey !== storageKey) {
    try {
      const parsed = JSON.parse(legacy) || [];
      localStorage.setItem(storageKey, JSON.stringify(parsed));
      return parsed;
    } catch (e) { return []; }
  }
  return [];
}

let playlist = loadPlaylist();
let shuffle = false;
let currentIndex = -1;
let ytPlayer = null;
let ytReady = false;
let pendingPlay = null;

function save() {
  localStorage.setItem(storageKey, JSON.stringify(playlist));
}

function extractID(url) {
  const trimmed = String(url).trim();
  const regExp = /(?:youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{6,})/;
  const match = trimmed.match(regExp);
  return match ? match[1] : null;
}

function thumbUrl(id) {
  return "https://img.youtube.com/vi/" + id + "/mqdefault.jpg";
}

async function fetchTitle(id) {
  try {
    const res = await fetch(
      "https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=" +
        encodeURIComponent(id) +
        "&format=json"
    );
    if (!res.ok) return null;
    const data = await res.json();
    return data.title || null;
  } catch (e) {
    return null;
  }
}

async function addSong() {
  const inputEl = document.getElementById("linkInput");
  const id = extractID(inputEl.value);

  if (!id) { alert("Invalid YouTube link"); return; }

  const song = { id: id, title: "Loading…" };
  playlist.push(song);
  save();
  render();
  inputEl.value = "";

  const title = await fetchTitle(id);
  song.title = title || "YouTube Video";
  save();
  render();
}

async function backfillTitles() {
  let changed = false;
  for (const song of playlist) {
    if (!song.title || song.title === "YouTube Video" || song.title === "Loading…" || song.title === "Loading...") {
      const title = await fetchTitle(song.id);
      if (title) {
        song.title = title;
        changed = true;
      }
    }
  }
  if (changed) {
    save();
    render();
    updateNowPlaying();
  }
}

function deleteSong(index) {
  const wasPlaying = index === currentIndex;
  playlist.splice(index, 1);
  if (wasPlaying) {
    currentIndex = -1;
    if (ytPlayer && ytPlayer.stopVideo) {
      try { ytPlayer.stopVideo(); } catch (e) {}
    }
    document.getElementById("player").style.display = "none";
    document.getElementById("playerPlaceholder").style.display = "block";
    document.getElementById("playerControls").style.display = "none";
  } else if (index < currentIndex) {
    currentIndex--;
  }
  save();
  render();
  updateNowPlaying();
}

function onYouTubeIframeAPIReady() {
  ytReady = true;
  if (pendingPlay !== null) {
    const i = pendingPlay;
    pendingPlay = null;
    play(i);
  }
}

function play(index) {
  if (!playlist.length || index < 0 || index >= playlist.length) return;
  currentIndex = index;
  const placeholder = document.getElementById("playerPlaceholder");
  const playerEl = document.getElementById("player");
  const controls = document.getElementById("playerControls");

  if (!ytReady) {
    pendingPlay = index;
    return;
  }

  placeholder.style.display = "none";
  playerEl.style.display = "block";
  controls.style.display = "flex";

  if (!ytPlayer) {
    ytPlayer = new YT.Player("player", {
      width: "100%",
      height: "420",
      videoId: playlist[index].id,
      playerVars: {
        autoplay: 1,
        playsinline: 1,
        rel: 0,
        modestbranding: 1
      },
      events: {
        onReady: function(e) { e.target.playVideo(); },
        onStateChange: function(e) { if (e.data === YT.PlayerState.ENDED) next(); }
      }
    });
  } else {
    ytPlayer.loadVideoById(playlist[index].id);
  }

  render();
  updateNowPlaying();

  const wrap = document.getElementById("playerWrap");
  if (wrap && wrap.scrollIntoView) {
    wrap.scrollIntoView({ behavior: "smooth", block: "start" });
  }
}

function toggleShuffle() {
  shuffle = !shuffle;
  const btn = document.getElementById("shuffleBtn");
  if (btn) btn.innerText = "Shuffle: " + (shuffle ? "On" : "Off");
  if (btn) btn.classList.toggle("btn-gold", shuffle);
  if (btn) btn.classList.toggle("btn-outline", !shuffle);
}

function next() {
  if (!playlist.length) return;
  if (shuffle && playlist.length > 1) {
    let n = currentIndex;
    while (n === currentIndex) n = Math.floor(Math.random() * playlist.length);
    currentIndex = n;
  } else {
    currentIndex = (currentIndex + 1) % playlist.length;
  }
  play(currentIndex);
}

function prev() {
  if (!playlist.length) return;
  if (currentIndex <= 0) currentIndex = playlist.length - 1;
  else currentIndex--;
  play(currentIndex);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function updateNowPlaying() {
  const el = document.getElementById("nowPlayingTitle");
  if (!el) return;
  if (currentIndex >= 0 && playlist[currentIndex]) {
    el.innerText = playlist[currentIndex].title || "YouTube Video";
  } else {
    el.innerText = "Nothing playing yet";
  }
}

function render() {
  const div = document.getElementById("playlist");
  div.innerHTML = "";

  if (!playlist.length) {
    div.innerHTML = '<div class="empty-state">No songs yet. Paste a YouTube link above to add one.</div>';
    return;
  }

  playlist.forEach((song, i) => {
    const item = document.createElement("div");
    item.className = "song-card" + (i === currentIndex ? " is-playing" : "");
    item.innerHTML =
      '<div class="song-thumb" onclick="play(' + i + ')">' +
        '<img src="' + thumbUrl(song.id) + '" alt="" loading="lazy">' +
        '<span class="song-thumb-play" aria-hidden="true">▶</span>' +
      '</div>' +
      '<div class="song-info">' +
        '<div class="song-card-title">' + escapeHtml(song.title) + '</div>' +
        (i === currentIndex ? '<div class="song-card-status">Now playing</div>' : '') +
      '</div>' +
      '<div class="song-actions">' +
        '<button class="btn btn-navy btn-lg" onclick="play(' + i + ')">▶ Play</button>' +
        '<button class="btn btn-danger btn-lg" onclick="deleteSong(' + i + ')">Remove</button>' +
      '</div>';
    div.appendChild(item);
  });
}

render();
updateNowPlaying();
backfillTitles();
</script>

</body>
</html>
