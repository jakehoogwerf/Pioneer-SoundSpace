<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PVS SoundSpace · Class Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <div class="logo-wrap">
      <img src="https://pvs.wa.edu.au/wp-content/uploads/2019/09/Pioneer-Village-School-Long.png" alt="Pioneer Village School">
    </div>
    <div class="hd"></div>
    <div class="header-title">
      <h1>PVS SOUNDSPACE</h1>
      <p>Class Music Player</p>
    </div>
  </div>
  <div class="header-right">
    <a class="btn btn-ghost" href="index.html">All Classes</a>
  </div>
</header>
<div class="accent-bar"></div>

<main class="main">
  <a href="index.html" class="back-link">← Back to classes</a>
  <h2 class="page-title" id="classTitle">Class</h2>
  <p class="page-subtitle">Add YouTube links to build a playlist for this class.</p>

  <div class="player-wrap" id="playerWrap">
    <div class="player-placeholder" id="playerPlaceholder">No song playing yet — add a link or press play below.</div>
    <iframe id="player" allow="autoplay; encrypted-media" allowfullscreen style="display:none;"></iframe>
  </div>

  <div class="panel">
    <h3>Add a Song</h3>
    <div class="controls">
      <input id="linkInput" placeholder="Paste a YouTube link…">
      <button class="btn btn-gold" onclick="addSong()">Add Song</button>
      <button class="btn btn-outline" id="shuffleBtn" onclick="toggleShuffle()">Shuffle: Off</button>
    </div>
  </div>

  <div class="panel">
    <h3>Playlist</h3>
    <div id="playlist"></div>
  </div>
</main>

<script>
const params = new URLSearchParams(window.location.search);
const className = params.get("class") || "default";

document.getElementById("classTitle").innerText =
  className.charAt(0).toUpperCase() + className.slice(1);

let playlist = JSON.parse(localStorage.getItem(className)) || [];
let shuffle = false;
let currentIndex = 0;

function save() {
  localStorage.setItem(className, JSON.stringify(playlist));
}

function extractID(url) {
  const regExp = /(?:youtube\.com.*v=|youtu\.be\/)([^&?/]+)/;
  const match = url.match(regExp);
  return match ? match[1] : null;
}

async function fetchTitle(id) {
  try {
    const res = await fetch(
      "https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=" +
        id +
        "&format=json"
    );
    if (!res.ok) return null;
    const data = await res.json();
    return data.title || null;
  } catch (e) {
    return null;
  }
}

async function addSong() {
  const input = document.getElementById("linkInput").value;
  const id = extractID(input);

  if (!id) return alert("Invalid YouTube link");

  const song = { id: id, title: "Loading..." };
  playlist.push(song);
  save();
  render();
  document.getElementById("linkInput").value = "";

  const title = await fetchTitle(id);
  song.title = title || "YouTube Video";
  save();
  render();
}

async function backfillTitles() {
  let changed = false;
  for (const song of playlist) {
    if (!song.title || song.title === "YouTube Video" || song.title === "Loading...") {
      const title = await fetchTitle(song.id);
      if (title) {
        song.title = title;
        changed = true;
      }
    }
  }
  if (changed) {
    save();
    render();
  }
}

function deleteSong(index) {
  playlist.splice(index, 1);
  save();
  render();
}

function play(index) {
  if (!playlist.length) return;

  currentIndex = index;
  const player = document.getElementById("player");
  const placeholder = document.getElementById("playerPlaceholder");
  player.src =
    "https://www.youtube.com/embed/" +
    playlist[index].id +
    "?autoplay=1";
  player.style.display = "block";
  if (placeholder) placeholder.style.display = "none";
  render();
}

function toggleShuffle() {
  shuffle = !shuffle;
  const btn = document.getElementById("shuffleBtn");
  if (btn) btn.innerText = "Shuffle: " + (shuffle ? "On" : "Off");
}

function next() {
  if (!playlist.length) return;

  if (shuffle) {
    currentIndex = Math.floor(Math.random() * playlist.length);
  } else {
    currentIndex = (currentIndex + 1) % playlist.length;
  }

  play(currentIndex);
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function render() {
  const div = document.getElementById("playlist");
  div.innerHTML = "";

  if (!playlist.length) {
    div.innerHTML = '<div class="empty-state">No songs yet. Paste a YouTube link above to add one.</div>';
    return;
  }

  playlist.forEach((song, i) => {
    const item = document.createElement("div");
    item.className = "song";
    item.innerHTML = `
      <button class="btn btn-navy btn-sm" onclick="play(${i})">▶ Play</button>
      <span class="song-title">${escapeHtml(song.title)}</span>
      <button class="btn btn-danger btn-sm" onclick="deleteSong(${i})">Remove</button>
    `;
    div.appendChild(item);
  });
}

if (playlist.length > 0) {
  play(0);
}

render();
backfillTitles();
</script>

</body>
</html>
