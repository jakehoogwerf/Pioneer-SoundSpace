<!DOCTYPE html>
<html>
<head>
  <title>Class Player</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .song {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }

    button {
      cursor: pointer;
    }

    iframe {
      margin-top: 20px;
      width: 100%;
      max-width: 700px;
      height: 400px;
    }
  </style>
</head>

<body>

<a href="index.html" class="back">⬅ Back</a>

<h1 id="classTitle"></h1>

<div class="controls">
  <input id="linkInput" placeholder="Paste YouTube link here">
  <button onclick="addSong()">Add Song</button>
  <button onclick="toggleShuffle()">Shuffle</button>
</div>

<div id="playlist"></div>

<iframe id="player" allow="autoplay; encrypted-media" allowfullscreen></iframe>

<script>
const params = new URLSearchParams(window.location.search);
const className = params.get("class") || "default";

document.getElementById("classTitle").innerText =
  className.charAt(0).toUpperCase() + className.slice(1);

let playlist = JSON.parse(localStorage.getItem(className)) || [];
let shuffle = false;
let currentIndex = 0;

function save() {
  localStorage.setItem(className, JSON.stringify(playlist));
}

// Better YouTube ID extractor (supports all formats)
function extractID(url) {
  const regExp = /(?:youtube\.com.*v=|youtu\.be\/)([^&?/]+)/;
  const match = url.match(regExp);
  return match ? match[1] : null;
}

function addSong() {
  const input = document.getElementById("linkInput").value;
  const id = extractID(input);

  if (!id) return alert("Invalid YouTube link");

  playlist.push({
    id: id,
    title: "YouTube Video"
  });

  save();
  render();
  document.getElementById("linkInput").value = "";
}

function deleteSong(index) {
  playlist.splice(index, 1);
  save();
  render();
}

function play(index) {
  if (!playlist.length) return;

  currentIndex = index;

  document.getElementById("player").src =
    "https://www.youtube.com/embed/" +
    playlist[index].id +
    "?autoplay=1";
}

function toggleShuffle() {
  shuffle = !shuffle;
  alert("Shuffle is now " + (shuffle ? "ON" : "OFF"));
}

function next() {
  if (!playlist.length) return;

  if (shuffle) {
    currentIndex = Math.floor(Math.random() * playlist.length);
  } else {
    currentIndex = (currentIndex + 1) % playlist.length;
  }

  play(currentIndex);
}

function render() {
  const div = document.getElementById("playlist");
  div.innerHTML = "";

  playlist.forEach((song, i) => {
    const item = document.createElement("div");
    item.className = "song";

    item.innerHTML = `
      <button onclick="play(${i})">▶ Play</button>
      <span>${song.title}</span>
      <button onclick="deleteSong(${i})">❌</button>
    `;

    div.appendChild(item);
  });
}

// Auto play first song if exists
if (playlist.length > 0) {
  play(0);
}

render();
</script>

</body>
</html>
