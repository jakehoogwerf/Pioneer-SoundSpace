<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PVS SoundSpace</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    (function(){
      var f = localStorage.getItem('pvs_force_theme');
      var t = (f === 'dark' || f === 'light') ? f : (localStorage.getItem('pvs_theme') || 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <div class="logo-wrap">
      <img src="https://pvs.wa.edu.au/wp-content/uploads/2019/09/Pioneer-Village-School-Long.png" alt="Pioneer Village School">
    </div>
    <div class="hd"></div>
    <div class="header-title">
      <h1>PVS SOUNDSPACE</h1>
      <p>Class Music Player</p>
    </div>
  </div>
  <div class="header-right">
    <button class="btn btn-ghost theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme">🌙</button>
    <a class="btn btn-ghost" href="https://pvs-pe-hub.netlify.app/">PE Hub</a>
  </div>
</header>
<div class="accent-bar"></div>

<main class="main">
  <h2 class="page-title">Select a Class</h2>
  <p class="page-subtitle">Choose a class to open its playlist and start playing.</p>

  <div class="grid">
    <a href="class.html?class=kangaroos" class="card">
      <span class="card-label">Class</span>
      <span class="card-name">Kangaroos</span>
    </a>
    <a href="class.html?class=bilby" class="card">
      <span class="card-label">Class</span>
      <span class="card-name">Bilby</span>
    </a>
    <a href="class.html?class=swans" class="card">
      <span class="card-label">Class</span>
      <span class="card-name">Swans</span>
    </a>
    <a href="class.html?class=numbats" class="card">
      <span class="card-label">Class</span>
      <span class="card-name">Numbats</span>
    </a>
    <a href="class.html?class=bobtails" class="card">
      <span class="card-label">Class</span>
      <span class="card-name">Bobtails</span>
    </a>
    <a href="class.html?class=karak" class="card">
      <span class="card-label">Class</span>
      <span class="card-name">Karak</span>
    </a>
    <a href="class.html?class=wombats" class="card">
      <span class="card-label">Class</span>
      <span class="card-name">Wombats</span>
    </a>
    <a href="class.html?class=PE" class="card">
      <span class="card-label">Class</span>
      <span class="card-name">PE Class</span>
    </a>
  </div>
</main>

<script>
function getTheme() {
  return document.documentElement.getAttribute('data-theme') || 'light';
}
function toggleTheme() {
  document.body.classList.add('theme-transition');
  var next = getTheme() === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('pvs_theme', next);
  var forced = localStorage.getItem('pvs_force_theme');
  if (forced && forced !== 'auto') localStorage.setItem('pvs_force_theme', next);
  updateThemeButton();
  setTimeout(function(){ document.body.classList.remove('theme-transition'); }, 350);
}
function updateThemeButton() {
  var btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = getTheme() === 'dark' ? '☀️' : '🌙';
}
updateThemeButton();
</script>

</body>
</html>
